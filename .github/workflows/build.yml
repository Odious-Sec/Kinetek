name: Build desktop apps

# Builds native Windows and Linux installers on GitHub's runners (a Mac can't
# cross-compile a Tauri app for them). Run it by hand from the Actions tab
# ("Run workflow"), or push a tag like `v0.1.0`. The installers are uploaded as
# downloadable artifacts on the run — no public release is created.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            name: linux
          - platform: windows-latest
            name: windows
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Tauri v2's Linux runtime deps (WebKitGTK etc.). No-op on Windows.
      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            build-essential

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # Builds the frontend (via beforeBuildCommand) + the native bundle.
      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # The installers land under src-tauri/target/release/bundle/* :
      #   Linux   → deb/, rpm/, appimage/
      #   Windows → msi/, nsis/
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: kinetek-${{ matrix.name }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
